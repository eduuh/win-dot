# win-dot helix config
# Ported from ~/.config/nvim. Aim: same feel as the WSL nvim setup.
#
# Most of the LSP keys (gd / gr / gi / gy / K / [d / ]d / <space>r /
# <space>a / <space>s / <space>S / <space>b / <space>f / <space>/) are
# already Helix defaults that match the nvim mappings, so we only set
# what differs.
#
# Helix runtime themes used here are bundled. Browse with `:theme`.

theme = "catppuccin_mocha"

[editor]
# nvim had number=false + relativenumber=false. Match it.
line-number = "absolute"
mouse = true
scrolloff = 5
shell = ["pwsh", "-NoProfile", "-Command"]
true-color = true
auto-format = true          # mirrors conform.nvim format_on_save
auto-pairs = true
auto-completion = true
auto-save = false
completion-trigger-len = 2
idle-timeout = 50
bufferline = "multiple"
color-modes = true
cursorline = true
text-width = 80             # nvim textwidth
rulers = [80, 100]
end-of-line-diagnostics = "hint"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.statusline]
left = ["mode", "spinner", "version-control", "file-name", "file-modification-indicator"]
center = []
right = ["diagnostics", "selections", "register", "position", "file-encoding", "file-line-ending", "file-type"]
separator = "│"
mode.normal = "NOR"
mode.insert = "INS"
mode.select = "SEL"

[editor.lsp]
display-messages = true
display-inlay-hints = true  # mirrors lsp-inlayhints.nvim
auto-signature-help = true
display-signature-help-docs = true

[editor.indent-guides]
render = true
character = "▏"             # mirrors indent-blankline.nvim
skip-levels = 1

[editor.smart-tab]
enable = true

[editor.soft-wrap]
enable = true               # nvim wrap = true + linebreak
max-wrap = 25
max-indent-retain = 0
wrap-indicator = "↪ "       # nvim showbreak

[editor.inline-diagnostics]
cursor-line = "warning"
other-lines = "disable"

[editor.whitespace.render]
space = "none"
tab = "all"
nbsp = "all"
newline = "none"

[editor.whitespace.characters]
tab = "→"
nbsp = "␣"

# ---------------------------------------------------------------------------
# Keymaps
# ---------------------------------------------------------------------------
# nvim muscle memory worth keeping; everything else stays Helix-default so
# learning the editor doesn't fork.
#   <C-s>           save (normal + insert)
#   <backspace>     previous buffer (nvim <BS> = <C-^>)
#   ;n / ;p         next / previous buffer (nvim cnext / cprev pattern)
#   <space>ff       file picker  (nvim <leader>ff)
#   <space>fw       global search (nvim <leader>fw)
#   <space>fo       jumplist     (nvim <leader>fo, closest to oldfiles)
#   <space>fb       buffer picker (nvim <leader>fb)
#   gcc             toggle line comment (nvim muscle memory; helix uses `C`)

[keys.normal]
C-s = ":write"
backspace = "goto_previous_buffer"
";" = { n = "goto_next_buffer", p = "goto_previous_buffer" }

[keys.normal.space]
f = { f = "file_picker", w = "global_search", o = "jumplist_picker", b = "buffer_picker" }

[keys.normal.g.c]
c = "toggle_comments"

[keys.insert]
C-s = ["normal_mode", ":write"]

[keys.select]
C-s = ["normal_mode", ":write"]
";" = { n = "goto_next_buffer", p = "goto_previous_buffer" }
